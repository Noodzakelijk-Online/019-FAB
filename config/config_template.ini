[app]
log_file = logs/app.log

[operations]
# Local-first FAB operating ledger. Stores workflow runs, document statuses,
# review items, routing attempts, reconciliation matches, and audit events.
# Keep this outside Git-tracked folders when processing real financial data.
local_ledger_enabled = true
ledger_path = data/fab_operations.sqlite3
api_host = 127.0.0.1
api_port = 5001
# Optional display URL for a supervised tunnel such as ngrok.
# Keep blank for normal local use; configure api_token before setting this.
api_base_url =
api_token =
local_intake_paths = downloads/sort-out
local_intake_extensions = pdf,jpg,jpeg,png,heic,tif,tiff,txt,csv
backup_dir = data/backups
# Checksum-bound provisional JSON/CSV reports. Keep outside Git for real data.
report_dir = data/reports
categorization_review_confidence_threshold = 0.7
waveapps_default_account = Uncategorized
# Local reconciliation uses the thresholds in the [reconciliation] section.
review_stale_hours = 48
document_stale_hours = 24
routing_stale_hours = 24
workflow_stale_hours = 6
export_execution_stale_hours = 1
wave_entity_sync_stale_hours = 24
# Read-only Wave mirror retries are held back after provider/throttle failures.
wave_entity_sync_retry_hours = 1
# Do not wait by default in a worker or dashboard request when an external
# provider is throttled. FAB records a deferred retry instead of a failure.
outbound_rate_limit_max_wait_seconds = 0
rate_limit_retry_delay_seconds = 60
quota_exhausted_retry_delay_seconds = 3600
# Read-only paginated Wave sync may wait briefly between provider requests.
wave_entity_sync_max_wait_seconds = 5
# High-risk external posting is draft-first. Leave disabled and use FAB's
# approval/export workflow unless a supervised legacy workflow is intended.
workflow_execute_external_posting = false
# The operations ledger is FAB's posting source of truth. The worker may prepare
# drafts automatically, but only executes already-approved exports when enabled.
fab_autonomy_execute_approved_exports = false
# Read-only customer/product/invoice refresh is due-aware and enabled by
# default for configured Wave targets. Set false to keep it manual-only.
fab_autonomy_sync_wave_entities = true
# Prevent worker, Task Scheduler, and API triggers from overlapping one cycle.
# Expired leases are recovered automatically after this timeout.
fab_autonomy_lease_seconds = 21600
worker_run_local_autonomy = true
worker_include_wave_plan = true
worker_include_wave_sync = true
worker_generate_scheduled_reports = true
# Materialize current health issues into the local notification inbox.
worker_refresh_notifications = true
worker_interval_seconds = 300
worker_run_once = false
# Disable only for local-folder-only operation that does not use legacy source connectors.
worker_run_legacy_workflow = true
worker_process_approved_postings = true
worker_process_due_retries = true
# Compatibility only. Leave false so the worker does not poll legacy
# posting_attempts alongside operations export_attempts.
worker_process_legacy_postings = false

# The worker creates at most one run for each deterministic schedule slot.
# Monthly day is intentionally limited to 1-28 for predictable Windows scheduling.
report_schedule_enabled = true
report_schedule_id = default-financial-report
report_schedule_frequency = monthly
report_schedule_month_day = 1
report_schedule_weekday = 0
report_schedule_hour = 6
report_schedule_minute = 0
report_schedule_timezone = Europe/Amsterdam
report_schedule_period_mode = previous_month
report_schedule_report_type = overview
report_schedule_basis = accrual
report_schedule_target_system =
report_schedule_formats = json,csv
report_schedule_retry_hours = 6
report_stale_hours = 2

# Default in-app notification threshold. Per-event preferences stored in the
# operations ledger override this. External delivery remains disabled.
notification_minimum_severity = low
# Alert from the read-only Wave invoice mirror before an unsettled due date.
invoice_due_soon_days = 7

# Optional web operations API mirror. Leave disabled for pure local operation.
enabled = false
api_url =
timeout_seconds = 5

[waveapps]
# Leave blank unless every generic "waveapps" route should intentionally use
# one account. Safer document/routing rules use waveapps_business or
# waveapps_personal explicitly.
default_target =
api_url = https://gql.waveapps.com/graphql/public
request_timeout_seconds = 30

[waveapps_business]
# Required for a verified Wave money-transaction submission. Keep tokens out of
# this file. Use FAB_WAVEAPPS_BUSINESS_ACCESS_TOKEN and
# FAB_WAVEAPPS_BUSINESS_ID or a local secret store.
access_token =
id =
anchor_account_id =
# Optional FAB category -> Wave account-label mapping. IDs stay separate.
category_mapping = {}
# JSON mapping from FAB/Wave category label to the actual Wave chart-of-accounts ID.
category_account_ids = {}
default_category_account_id =

[waveapps_personal]
# Use FAB_WAVEAPPS_PERSONAL_ACCESS_TOKEN and FAB_WAVEAPPS_PERSONAL_ID instead
# of committing these values.
access_token =
id =
anchor_account_id =
category_mapping = {}
category_account_ids = {}
default_category_account_id =

[mijngeldzaken]
# FAB prepares a durable CSV here after approval. Keep this directory outside
# Git-tracked paths when possible; data/ is ignored by this repository.
export_dir = data/exports/mijngeldzaken
default_account = Huishouden
csv_delimiter = ;
# MijnGeldzaken submission always uses a supervised user-owned session. Do not
# add a username, password, or DigiD credential to this file.
supervised_session_required = true
