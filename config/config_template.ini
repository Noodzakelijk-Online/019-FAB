[app]
log_file = logs/fab.log
attachments_save_dir = data/attachments
manual_review_queue_file = data/manual_review_queue.json
enabled_fetchers = local_folder
local_input_dir = data/sort_out
live_posting_enabled = false
worker_interval_seconds = 300
worker_run_once = false
report_export_dir = data/reports
backup_base_dir = backups

[database]
database_path = data/fab.sqlite3

[dashboard]
host = 127.0.0.1
port = 5001
dashboard_access_token = CHANGE_ME_TO_A_LONG_RANDOM_TOKEN
public_base_url =

[banking]
banking_mode = local_import
bank_import_dir = data/bank_exports
default_currency = EUR
reconciliation_match_threshold = 0.85
reconciliation_possible_match_threshold = 0.65
reconciliation_amount_tolerance = 0.02
reconciliation_date_tolerance_days = 3
ignore_positive_transactions_for_missing_receipts = true

[missing_receipts]
missing_receipt_follow_up_days = 7
missing_receipt_max_reminders = 3

[google_drive]
drive_folder_id =
drive_token_path = data/secrets/token_drive.pickle
drive_credentials_path = data/secrets/credentials_drive.json

[gmail]
gmail_query = has:attachment
gmail_token_path = data/secrets/token.pickle
gmail_credentials_path = data/secrets/credentials.json

[ocr]
primary_ocr_method = tesseract
tesseract_cmd = tesseract
tesseract_lang = eng+nld
pdf_ocr_dpi = 250
enable_enhanced_preprocessing = false
enable_template_matching = true
enable_line_item_extraction = true

[safety]
auto_process = 0.95
approval_required = 0.85
manual_review = 0.70
posting = 0.95
minimum_field_confidence = 0.70
minimum_required_field_confidence = 0.75

[routing]
bookkeeping_platform_routes = {}
bookkeeping_account_map = {}

[mijngeldzaken]
mijngeldzaken_username =
mijngeldzaken_password =
mijngeldzaken_login_url = https://www.mijngeldzaken.nl/login
mijngeldzaken_import_url = https://www.mijngeldzaken.nl/import

[waveapps_business]
waveapps_business_access_token =
waveapps_business_id =

[waveapps_personal]
waveapps_personal_access_token =
waveapps_personal_id =
waveapps_handicap_tag = #handicap
