[app]
log_file = logs/app.log

[operations]
# Local-first FAB operating ledger. Stores workflow runs, document statuses,
# review items, routing attempts, reconciliation matches, and audit events.
# Keep this outside Git-tracked folders when processing real financial data.
local_ledger_enabled = true
ledger_path = data/fab_operations.sqlite3
api_host = 127.0.0.1
api_port = 5001
# Optional display URL for a supervised tunnel such as ngrok.
# Keep blank for normal local use; configure api_token before setting this.
api_base_url =
api_token =
# Local HAI control connector. Only the bounded governed command catalog is
# enabled; approvals, exports, downstream submissions, restores, and access control remain excluded.
fab_hai_connector_enabled = true
fab_hai_allowed_commands = rescan_intake,process_imported,reprocess_incomplete,sync_sources,run_safe_cycle,run_due_recovery,run_reconciliation,refresh_notifications,run_due_reports,assess_compliance,record_wave_attachment_verification,archive_verified_drive_sources
local_intake_paths = downloads/sort-out
local_intake_extensions = pdf,jpg,jpeg,png,heic,tif,tiff,txt,csv
# JSON upload limit used by the local operator dashboard.
local_upload_max_bytes = 6291456
backup_dir = data/backups
# Checksum-bound provisional JSON/CSV reports. Keep outside Git for real data.
report_dir = data/reports
categorization_review_confidence_threshold = 0.7
# Optional comma-separated additions to FAB's built-in bookkeeping intents.
# Review decisions use these stable intents; Wave account IDs are mapped later.
fab_category_catalog =
waveapps_default_account = Uncategorized
# Local reconciliation uses the thresholds in the [reconciliation] section.
review_stale_hours = 48
document_stale_hours = 24
routing_stale_hours = 24
workflow_stale_hours = 6
source_stale_hours = 24
export_execution_stale_hours = 1
wave_entity_sync_stale_hours = 24
# Read-only Wave mirror retries are held back after provider/throttle failures.
wave_entity_sync_retry_hours = 1
# Do not wait by default in a worker or dashboard request when an external
# provider is throttled. FAB records a deferred retry instead of a failure.
outbound_rate_limit_max_wait_seconds = 0
rate_limit_retry_delay_seconds = 60
quota_exhausted_retry_delay_seconds = 3600
# Read-only paginated Wave sync may wait briefly between provider requests.
wave_entity_sync_max_wait_seconds = 5
# High-risk external posting is draft-first. Leave disabled and use FAB's
# approval/export workflow unless a supervised legacy workflow is intended.
workflow_execute_external_posting = false
# The operations ledger is FAB's posting source of truth. The worker may prepare
# drafts automatically, but only executes already-approved exports when enabled.
fab_autonomy_execute_approved_exports = false
# Read-only customer/product/invoice refresh is due-aware and enabled by
# default for configured Wave targets. Set false to keep it manual-only.
fab_autonomy_sync_wave_entities = true
# Prevent worker, Task Scheduler, and API triggers from overlapping one cycle.
# Expired leases are recovered automatically after this timeout.
fab_autonomy_lease_seconds = 21600
# Prevent API and worker connector intake from creating overlapping source runs.
connector_intake_lease_seconds = 21600
# Retry only failed read-only/draft workflow steps. External posting is excluded.
worker_recover_workflows = true
worker_recovery_batch_limit = 5
workflow_recovery_max_retries = 3
workflow_recovery_base_delay_seconds = 300
workflow_recovery_max_delay_seconds = 3600
# A running autonomous/connector workflow is finalized as interrupted only after
# this age and only when its corresponding runtime lease is no longer active.
workflow_recovery_stale_seconds = 21600
workflow_recovery_lease_seconds = 1800
worker_run_local_autonomy = true
worker_include_wave_plan = true
worker_include_wave_sync = true
worker_generate_scheduled_reports = true
# Create an idempotent current-quarter VAT/retention assessment before alerts.
worker_assess_compliance = true
# Materialize current health issues into the local notification inbox.
worker_refresh_notifications = true
# Runs a move-only archive pass after export handling. The pass remains inert
# until google_drive.archive_verified_files is explicitly enabled and every
# transaction, attachment, checksum, field, and review gate succeeds.
worker_archive_verified_drive_sources = true
worker_interval_seconds = 300
worker_run_once = false
# Connector intake feeds the durable local ledger before autonomous processing.
worker_sync_source_connectors = true
# Blank means every explicitly enabled connector.
worker_source_connectors =
# Compatibility pipeline. Leave false when connector intake + local autonomy are enabled.
worker_run_legacy_workflow = false
worker_process_approved_postings = false
worker_process_due_retries = true
# Compatibility only. Leave false so the worker does not poll legacy
# posting_attempts alongside operations export_attempts.
worker_process_legacy_postings = false

# The worker creates at most one run for each deterministic schedule slot.
# Monthly day is intentionally limited to 1-28 for predictable Windows scheduling.
report_schedule_enabled = true
report_schedule_id = default-financial-report
report_schedule_frequency = monthly
report_schedule_month_day = 1
report_schedule_weekday = 0
report_schedule_hour = 6
report_schedule_minute = 0
report_schedule_timezone = Europe/Amsterdam
report_schedule_period_mode = previous_month
report_schedule_report_type = overview
report_schedule_basis = accrual
report_schedule_target_system =
report_schedule_formats = json,csv
report_schedule_retry_hours = 6
report_stale_hours = 2

# Default in-app notification threshold. Per-event preferences stored in the
# operations ledger override this. External delivery remains disabled.
notification_minimum_severity = low
# Alert from the read-only Wave invoice mirror before an unsettled due date.
invoice_due_soon_days = 7

# Provisional Dutch VAT and administration-retention checks. These settings do
# not authorize filing or document deletion.
allowed_vat_rates = 0,9,21
vat_rate_tolerance_percentage_points = 0.75
document_retention_years = 7

# Optional web operations API mirror. Leave disabled for pure local operation.
enabled = false
api_url =
timeout_seconds = 5

[document_processing]
# Local-first Dutch/English OCR. Leave executable paths blank to auto-detect
# standard Windows installations made by winget.
primary_ocr_method = tesseract
tesseract_cmd =
tesseract_data_dir = data/tessdata
tesseract_lang = nld+eng
tesseract_pdf_dpi = 220
tesseract_pdf_max_pages = 20
poppler_path =
# Dutch VAT is at most 21% of a net amount. A 25% safety ceiling allows
# rounding and extraction variation while rejecting IDs and corrupted totals.
vat_max_total_ratio = 0.25

[categorizer]
# Deterministic and approved vendor rules operate without an ML model. These
# artifacts are created only from reviewed training evidence.
categorization_rules = {}
default_fallback_category = Manual Review
ml_confidence_threshold = 0.7
ml_model_path = data/models/ml_categorizer_model.joblib
ml_vectorizer_path = data/models/tfidf_vectorizer.joblib

[gmail]
enabled = false
# Optional explicit destination for every document from this connector.
# Use waveapps_business, waveapps_personal, or mijngeldzaken.
target_system =
credentials_file = credentials/gmail_credentials.json
token_file = tokens/gmail_token.pickle
attachment_download_dir = data/source_downloads/gmail
query = has:attachment
# Optional direct scanner-mailbox policy. When enabled, FAB accepts only PDF
# attachments with a valid PDF signature from an exact trusted sender address.
# Example for HP ePrint:
scanner_mode = false
trusted_senders =
max_attachment_bytes = 26214400
incremental_overlap_seconds = 86400
max_pages = 50
max_messages = 5000
interactive_auth = false

[google_drive]
enabled = false
# Optional explicit destination for every document from this approved folder.
# An upstream per-document target takes precedence over this default.
target_system =
credentials_file = credentials/drive_credentials.json
token_file = tokens/drive_token.pickle
download_dir = data/source_downloads/google-drive
folder_id =
# Maximum authenticated relay upload size. Wave compatibility is checked
# separately against its stricter 6 MB attachment limit.
relay_max_bytes = 26214400
# Optional high-assurance Drive -> Wave closeout. This never deletes files.
# The OAuth token needs full Drive scope to move an existing source file.
archive_verified_files = false
wave_archive_folder_id =
# Wave transaction and attachment readback must be this recent when moving.
wave_attachment_evidence_max_age_seconds = 900
max_pages = 50
max_files = 5000
interactive_auth = false

[freshdesk]
enabled = false
# Prefer APP_FRESHDESK_API_KEY over storing this value here.
api_key =
domain =
download_dir = data/source_downloads/freshdesk
max_pages = 50
page_size = 100

[google_photos]
enabled = false
mode = picker
credentials_file = credentials/photos_picker_credentials.json
picker_token_file = tokens/photos_picker_token.json
download_dir = data/source_downloads/google-photos-picker
picker_autoclose = true
max_pages = 50
max_items = 1000
max_media_bytes = 26214400
request_timeout_seconds = 30
# Whole-library background reads are no longer supported by Google. FAB must
# use a supervised Picker session and never launch it from the worker.

[waveapps]
# Leave blank unless every generic "waveapps" route should intentionally use
# one account. Safer document/routing rules use waveapps_business or
# waveapps_personal explicitly.
default_target =
api_url = https://gql.waveapps.com/graphql/public
request_timeout_seconds = 30

[waveapps_business]
# Required for a verified Wave money-transaction submission. Keep tokens out of
# this file. Use the operator dashboard encrypted Wave setup or
# FAB_WAVEAPPS_BUSINESS_ACCESS_TOKEN and
# FAB_WAVEAPPS_BUSINESS_ID or a local secret store.
access_token =
id =
anchor_account_id =
# Optional FAB category intent -> Wave account-label mapping. IDs stay separate.
category_mapping = {}
# JSON mapping from FAB category intent to the actual Wave chart-of-accounts ID.
# The operator dashboard builds this from accounts read back from Wave.
category_account_ids = {}
# Optional draft aid only. Autonomous posting never uses this account to hide
# a missing explicit category_account_ids entry.
default_category_account_id =

[waveapps_personal]
# Use the operator dashboard encrypted Wave setup or
# FAB_WAVEAPPS_PERSONAL_ACCESS_TOKEN and FAB_WAVEAPPS_PERSONAL_ID instead
# of committing these values.
access_token =
id =
anchor_account_id =
category_mapping = {}
category_account_ids = {}
default_category_account_id =

[mijngeldzaken]
# FAB prepares a durable CSV here after approval. Keep this directory outside
# Git-tracked paths when possible; data/ is ignored by this repository.
export_dir = data/exports/mijngeldzaken
default_account = Huishouden
csv_delimiter = ;
# MijnGeldzaken submission always uses a supervised user-owned session. Do not
# add a username, password, or DigiD credential to this file.
supervised_session_required = true
